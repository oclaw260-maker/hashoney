<svg xmlns="http://www.w3.org/2000/svg" width="180" height="156" viewBox="0 0 180 156">
  <defs>
    <g id="hex">
      <polygon points="30,1 90,1 120,39 90,77 30,77 0,39"
               fill="none" stroke="#FFB800" stroke-width="1.4" stroke-opacity="0.45"/>
    </g>
    <g id="hex-btc">
      <polygon points="30,1 90,1 120,39 90,77 30,77 0,39"
               fill="rgba(247,147,26,0.10)" stroke="#FFB800" stroke-width="1.6" stroke-opacity="0.75"/>
      <text x="60" y="52" text-anchor="middle" font-size="36" font-weight="800"
            font-family="Courier New, monospace" fill="#FFB800" fill-opacity="0.85">₿</text>
    </g>
  </defs>
  <!-- Row 1 -->
  <use href="#hex" x="0"   y="0"/>
  <use href="#hex" x="90"  y="0"/>
  <use href="#hex" x="180" y="0"/>
  <use href="#hex" x="-90" y="0"/>
  <!-- Row 2 (offset down) -->
  <use href="#hex" x="45"  y="78"/>
  <use href="#hex" x="135" y="78"/>
  <use href="#hex" x="-45" y="78"/>
  <use href="#hex" x="225" y="78"/>
  <!-- Bitcoin hex, every 6th cell -->
  <use href="#hex-btc" x="0"   y="0"/>
  <use href="#hex-btc" x="180" y="78"/>
  <use href="#hex-btc" x="90"  y="156"/>
  <use href="#hex-btc" x="-90" y="156"/>
</svg>
