<svg xmlns="http://www.w3.org/2000/svg" width="320" height="240" viewBox="0 0 320 240">
  <defs>
    <!-- Wide, flat hex (slightly elongated horizontally) -->
    <g id="hex">
      <polygon points="55,1 185,1 240,30 185,59 55,59 0,30"
               fill="none" stroke="#FFB800" stroke-width="1.2" stroke-opacity="0.55"/>
    </g>
    <!-- Elongated hex with Bitcoin logo, on a band every 3rd row -->
    <g id="hex-btc">
      <polygon points="55,1 185,1 240,30 185,59 55,59 0,30"
               fill="rgba(247,147,26,0.08)" stroke="#FFB800" stroke-width="1.4" stroke-opacity="0.85"/>
      <text x="120" y="42" text-anchor="middle" font-size="30" font-weight="800"
            font-family="Courier New, monospace" fill="#FFB800" fill-opacity="0.95">₿</text>
    </g>
  </defs>

  <!-- Row band of regular hexes (0 to 60 = 60 tall, fits one row of 60-tall hexes) -->
  <use href="#hex" x="0"    y="0"/>
  <use href="#hex" x="160"  y="0"/>
  <use href="#hex" x="-160" y="0"/>
  <use href="#hex" x="320"  y="0"/>

  <!-- Empty offset row (half-step down) — fills the gap between stripes -->
  <use href="#hex" x="80"   y="60"/>
  <use href="#hex" x="240"  y="60"/>
  <use href="#hex" x="-80"  y="60"/>
  <use href="#hex" x="400"  y="60"/>

  <!-- Stripe row with ₿ logos (every 3rd band = every 180px in y) -->
  <use href="#hex-btc" x="0"   y="120"/>
  <use href="#hex-btc" x="160" y="120"/>
  <use href="#hex-btc" x="-160" y="120"/>
  <use href="#hex-btc" x="320" y="120"/>

  <!-- Next two empty rows to repeat the band cycle -->
  <use href="#hex" x="0"    y="180"/>
  <use href="#hex" x="160"  y="180"/>
  <use href="#hex" x="-160" y="180"/>
  <use href="#hex" x="320"  y="180"/>

  <use href="#hex" x="80"   y="240"/>
  <use href="#hex" x="240"  y="240"/>
  <use href="#hex" x="-80"  y="240"/>
  <use href="#hex" x="400"  y="240"/>

  <!-- Second ₿ stripe at y=300 (would wrap above viewport but covers scrolling) -->
  <use href="#hex-btc" x="0"   y="300"/>
  <use href="#hex-btc" x="160" y="300"/>
  <use href="#hex-btc" x="-160" y="300"/>
  <use href="#hex-btc" x="320" y="300"/>
</svg>
